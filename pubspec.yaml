// ==================== HELPER EXTENSION ====================

extension WalletCopy on Wallet {
  Wallet copyWith({
    String? id,
    String? name,
    String? icon,
    double? balance,
    String? color,
  }) {
    return Wallet(
      id: id ?? this.id,
      name: name ?? this.name,
      icon: icon ?? this.icon,
      balance: balance ?? this.balance,
      color: color ?? this.color,
    );
  }
}

