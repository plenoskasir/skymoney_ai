  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text('Tambah Transaksi'),
        actions: [
          TextButton(
            onPressed: _saveTransaction,
            child: const Text('Simpan', style: TextStyle(fontWeight: FontWeight.bold)),
          ),
        ],
      ),
      body: SingleChildScrollView(
        padding: const EdgeInsets.all(16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            // Type Selector
            Row(
              children: [
                Expanded(
                  child: _buildTypeButton('expense', 'Pengeluaran', Icons.arrow_downward, Colors.red),
                ),
                const SizedBox(width: 12),
                Expanded(
                  child: _buildTypeButton('income', 'Pemasukan', Icons.arrow_upward, Colors.green),
                ),
              ],
            ),
            const SizedBox(height: 24),
            
            // Amount
            const Text('Nominal', style: TextStyle(fontWeight: FontWeight.bold)),
            const SizedBox(height: 8),
            TextField(
              controller: _amountController,
              keyboardType: TextInputType.number,
              decoration: InputDecoration(
                prefixText: 'Rp ',
                prefixStyle: const TextStyle(fontWeight: FontWeight.bold),
                hintText: '0',
                border: OutlineInputBorder(
                  borderRadius: BorderRadius.circular(12),
                ),
              ),
            ),
            const SizedBox(height: 16),
            
            // Category
            const Text('Kategori', style: TextStyle(fontWeight: FontWeight.bold)),
            const SizedBox(height: 8),
            Container(
              padding: const EdgeInsets.symmetric(horizontal: 12),
              decoration: BoxDecoration(
                border: Border.all(color: Colors.grey.shade300),
                borderRadius: BorderRadius.circular(12),
              ),
              child: DropdownButtonHideUnderline(
                child: DropdownButton<String>(
                  value: _selectedCategory,
                  isExpanded: true,
                  items: (_type == 'expense' ? _expenseCategories : _incomeCategories).map((cat) {
                    return DropdownMenuItem(value: cat, child: Text(cat));
                  }).toList(),
                  onChanged: (value) {
                    setState(() {
                      _selectedCategory = value!;
                    });
                  },
                ),
              ),
            ),
            const SizedBox(height: 16),
            
            // Wallet
            const Text('Dompet', style: TextStyle(fontWeight: FontWeight.bold)),
            const SizedBox(height: 8),
            Container(
              padding: const EdgeInsets.symmetric(horizontal: 12),
              decoration: BoxDecoration(
                border: Border.all(color: Colors.grey.shade300),
                borderRadius: BorderRadius.circular(12),
              ),
              child: DropdownButtonHideUnderline(
                child: DropdownButton<String>(
                  value: _selectedWallet,
                  isExpanded: true,
                  items: _wallets.map((wallet) {
                    return DropdownMenuItem(value: wallet, child: Text(wallet));
                  }).toList(),
                  onChanged: (value) {
                    setState(() {
                      _selectedWallet = value!;
                    });
                  },
                ),
              ),
            ),
            const SizedBox(height: 16),
            
            // Date
            const Text('Tanggal', style: TextStyle(fontWeight: FontWeight.bold)),
            const SizedBox(height: 8),
            InkWell(
              onTap: () async {
                final date = await showDatePicker(
                  context: context,
                  initialDate: _selectedDate,
                  firstDate: DateTime(2020),
                  lastDate: DateTime.now(),
                );
                if (date != null) {
                  setState(() {
                    _selectedDate = date;
                  });
                }
              },
              child: Container(
                padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 14),
                decoration: BoxDecoration(
                  border: Border.all(color: Colors.grey.shade300),
                  borderRadius: BorderRadius.circular(12),
                ),
                child: Row(
                  mainAxisAlignment: MainAxisAlignment.spaceBetween,
                  children: [
                    Text(_formatDate(_selectedDate)),
                    const Icon(Icons.calendar_today, size: 20, color: Colors.grey),
                  ],
                ),
              ),
            ),
            const SizedBox(height: 16),
            
            // Note
            const Text('Catatan (Opsional)', style: TextStyle(fontWeight: FontWeight.bold)),
            const SizedBox(height: 8),
            TextField(
              controller: _noteController,
              maxLines: 3,
              decoration: InputDecoration(
                hintText: 'Contoh: Makan siang di kantin',
                border: OutlineInputBorder(
                  borderRadius: BorderRadius.circular(12),
                ),
              ),
            ),
            const SizedBox(height: 16),
            
            // Receipt Photo
            Card(
              child: InkWell(
                onTap: () {
                  // Add receipt photo
                },
                child: Padding(
                  padding: const EdgeInsets.all(16),
                  child: Row(
                    children: [
                      const Icon(Icons.camera_alt, size: 32, color: Colors.grey),
                      const SizedBox(width: 16),
                      Expanded(
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            const Text('Foto Struk / Bukti'),
                            const SizedBox(height: 4),
                            Text(
                              'Ambil foto atau pilih dari galeri',
                              style: TextStyle(fontSize: 12, color: Colors.grey.shade600),
                            ),
                          ],
                        ),
                      ),
                      const Icon(Icons.chevron_right),
                    ],
                  ),
                ),
              ),
            ),
          ],
        ),
      ),
    );
  }
  
  Widget _buildTypeButton(String type, String label, IconData icon, Color color) {
    final isSelected = _type == type;
    return InkWell(
      onTap: () {
        setState(() {
          _type = type;
          _selectedCategory = type == 'expense' ? 'Makanan' : 'Gaji';
        });
      },
      child: Container(
        padding: const EdgeInsets.symmetric(vertical: 12),
        decoration: BoxDecoration(
          color: isSelected ? color.withOpacity(0.1) : Colors.grey.shade50,
          border: Border.all(
            color: isSelected ? color : Colors.grey.shade300,
          ),
          borderRadius: BorderRadius.circular(12),
        ),
        child: Row(
          mainAxisAlignment: MainAxisAlignment.center,
          children: [
            Icon(icon, color: isSelected ? color : Colors.grey, size: 20),
            const SizedBox(width: 8),
            Text(
              label,
              style: TextStyle(
                color: isSelected ? color : Colors.grey,
                fontWeight: isSelected ? FontWeight.bold : FontWeight.normal,
              ),
            ),
          ],
        ),
      ),
    );
  }
  
  void _saveTransaction() {
    if (_amountController.text.isEmpty) {
      ScaffoldMessenger.of(context).showSnackBar(
        const SnackBar(content: Text('Masukkan nominal transaksi')),
      );
      return;
    }
    
    final amount = double.parse(_amountController.text.replaceAll('.', '').replaceAll(',', ''));
    final newTransaction = Transaction(
      id: DateTime.now().millisecondsSinceEpoch.toString(),
      type: _type,
      amount: amount,
      category: _selectedCategory,
      wallet: _selectedWallet,
      note: _noteController.text,
      date: _selectedDate,
    );
    
    // In real app, save to Supabase here
    // For mock, just pop
    Navigator.pop(context);
    ScaffoldMessenger.of(context).showSnackBar(
      SnackBar(content: Text('Transaksi ${_type == 'income' ? 'pemasukan' : 'pengeluaran'} berhasil disimpan')),
    );
  }
  
  String _formatDate(DateTime date) {
    return DateFormat('dd MMMM yyyy', 'id_ID').format(date);
  }
}

// ==================== REPORT SCREEN ====================

class ReportScreen extends ConsumerWidget {
  const ReportScreen({super.key});

  @override
  Widget build(BuildContext context, WidgetRef ref) {
    final transactions = ref.watch(transactionProvider);
    
    final monthlyExpenses = transactions
        .where((t) => t.type == 'expense' && t.date.month == DateTime.now().month)
        .fold(0.0, (sum, t) => sum + t.amount);
    
    final monthlyIncome = transactions
        .where((t) => t.type == 'income' && t.date.month == DateTime.now().month)
        .fold(0.0, (sum, t) => sum + t.amount);
    
    // Group expenses by category
    final Map<String, double> categoryExpenses = {};
    for (final t in transactions.where((t) => t.type == 'expense')) {
      categoryExpenses[t.category] = (categoryExpenses[t.category] ?? 0) + t.amount;
    }
    
    return Scaffold(
      appBar: AppBar(title: const Text('Laporan Keuangan')),
      body: SingleChildScrollView(
        padding: const EdgeInsets.all(16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Card(
              child: Padding(
                padding: const EdgeInsets.all(16),
                child: Column(
                  children: [
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceBetween,
                      children: [
                        _buildSummaryCard('Pemasukan', monthlyIncome, Colors.green),
                        _buildSummaryCard('Pengeluaran', monthlyExpenses, Colors.red),
                      ],
                    ),
                    const Divider(height: 24),
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceBetween,
                      children: [
                        const Text('Sisa Bulan Ini'),
                        Text(
                          _formatCurrency(monthlyIncome - monthlyExpenses),
                          style: TextStyle(
                            fontSize: 18,
                            fontWeight: FontWeight.bold,
                            color: monthlyIncome - monthlyExpenses >= 0 ? Colors.green : Colors.red,
                          ),
                        ),
                      ],
                    ),
                  ],
                ),
              ),
            ),
            const SizedBox(height: 16),
            const Text('Pengeluaran per Kategori', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
            const SizedBox(height: 12),
            SizedBox(
              height: 250,
              child: _buildPieChart(categoryExpenses),
            ),
            const SizedBox(height: 16),
            const Text('Detail Kategori', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
            const SizedBox(height: 12),
            ...categoryExpenses.entries.map((entry) => _buildCategoryRow(entry.key, entry.value, monthlyExpenses)),
            const SizedBox(height: 16),
            ElevatedButton.icon(
              onPressed: () {
                // Export report
              },
              icon: const Icon(Icons.download),
              label: const Text('Export Laporan (CSV/PDF)'),
              style: ElevatedButton.styleFrom(
                minimumSize: const Size(double.infinity, 48),
              ),
            ),
          ],
        ),
      ),
    );
  }
  
  Widget _buildSummaryCard(String title, double amount, Color color) {
    return Column(
      children: [
        Text(title, style: const TextStyle(color: Colors.grey)),
        const SizedBox(height: 8),
        Text(
          _formatCurrency(amount),
          style: TextStyle(color: color, fontSize: 20, fontWeight: FontWeight.bold),
        ),
      ],
    );
  }
  
  Widget _buildPieChart(Map<String, double> data) {
    if (data.isEmpty) {
      return const Center(child: Text('Belum ada data pengeluaran'));
    }
    
    return FlChart(
      data: data,
    );
  }
  
  Widget _buildCategoryRow(String category, double amount, double total) {
    final percentage = (amount / total) * 100;
    return Padding(
      padding: const EdgeInsets.symmetric(vertical: 8),
      child: Column(
        children: [
          Row(
            mainAxisAlignment: MainAxisAlignment.spaceBetween,
            children: [
              Text(category, style: const TextStyle(fontWeight: FontWeight.w500)),
              Text(
                '${_formatCurrency(amount)} (${percentage.toStringAsFixed(1)}%)',
                style: const TextStyle(color: Colors.grey),
              ),
            ],
          ),
          const SizedBox(height: 4),
          ClipRRect(
            borderRadius: BorderRadius.circular(4),
            child: LinearProgressIndicator(
              value: percentage / 100,
              minHeight: 6,
              backgroundColor: Colors.grey.shade200,
              color: const Color(0xFF6C5CE7),
            ),
          ),
        ],
      ),
    );
  }
  
  String _formatCurrency(double amount) {
    final format = NumberFormat.currency(locale: 'id_ID', symbol: 'Rp ', decimalDigits: 0);
    return format.format(amount);
  }
}

