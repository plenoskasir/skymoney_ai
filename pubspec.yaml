// ==================== MODEL ====================

class Transaction {
  final String id;
  final String type; // 'income' or 'expense'
  final double amount;
  final String category;
  final String wallet;
  final String note;
  final DateTime date;
  final String? receiptUrl;

  Transaction({
    required this.id,
    required this.type,
    required this.amount,
    required this.category,
    required this.wallet,
    required this.note,
    required this.date,
    this.receiptUrl,
  });
}

class Wallet {
  final String id;
  final String name;
  final String icon;
  final double balance;
  final String color;

  Wallet({
    required this.id,
    required this.name,
    required this.icon,
    required this.balance,
    required this.color,
  });
}

class Budget {
  final String category;
  final double limit;
  final double spent;

  Budget({
    required this.category,
    required this.limit,
    required this.spent,
  });

  double get percentage => (spent / limit) * 100;
}

// ==================== PROVIDER (State Management) ====================

final transactionProvider = StateNotifierProvider<TransactionNotifier, List<Transaction>>((ref) {
  return TransactionNotifier();
});

class TransactionNotifier extends StateNotifier<List<Transaction>> {
  TransactionNotifier() : super(_getMockTransactions());

  void addTransaction(Transaction transaction) {
    state = [transaction, ...state];
  }

  void deleteTransaction(String id) {
    state = state.where((t) => t.id != id).toList();
  }

  void updateTransaction(Transaction updated) {
    final index = state.indexWhere((t) => t.id == updated.id);
    if (index != -1) {
      state = [...state];
      state[index] = updated;
    }
  }
}

final walletProvider = StateNotifierProvider<WalletNotifier, List<Wallet>>((ref) {
  return WalletNotifier();
});

class WalletNotifier extends StateNotifier<List<Wallet>> {
  WalletNotifier() : super(_getMockWallets());

  void updateBalance(String walletId, double newBalance) {
    final index = state.indexWhere((w) => w.id == walletId);
    if (index != -1) {
      final updated = state[index].copyWith(balance: newBalance);
      state = [...state];
      state[index] = updated;
    }
  }
}

final budgetProvider = Provider<List<Budget>>((ref) {
  return _getMockBudgets();
});

